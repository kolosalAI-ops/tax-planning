name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Extract repo name
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | cut -d'/' -f2)" >> "$GITHUB_OUTPUT"

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        env:
          GITHUB_PAGES: 'true'
          REPO_NAME: ${{ steps.repo.outputs.name }}
        run: npm run build

      - name: Assemble site
        run: |
          mkdir -p _site/dashboard

          # Copy root HTML files
          cp index.html _site/
          cp presentation.html _site/
          cp presentation-201.html _site/
          cp presentation-301.html _site/
          cp presentation-startup.html _site/
          cp presentation-rnd.html _site/
          cp International_Tax_Planning_Guide.html _site/

          # Copy dashboard static export
          cp -r dashboard/out/* _site/dashboard/

          # Copy chart images if they exist
          if [ -d "charts" ]; then
            cp -r charts _site/charts
          fi

          # Prevent Jekyll processing (preserves _next directory)
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
